{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div style="background-color: #800000; padding: 15px; text-align: center;">
                    <h4 style="color: white; margin: 0;">MMTTC Portal Login</h4>
                    <p style="color: #ddd; font-size: 12px; margin: 4px 0 0;">
                        Malaviya Mission Teacher Training Centre
                    </p>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn w-100 text-white fw-bold"
                            style="background-color: #800000;">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    <hr>
                    <p class="text-center mb-0" style="font-size: 13px;">
                        New applicant?
                        <a href="{% url 'register' %}" style="color: #800000; font-weight: bold;">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
