{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4>Upload HoD Signed Form</h4>
                    <p class="text-muted">Course: <strong>{{ application.course.title }}</strong></p>
                    <hr>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Upload Signed Form (PDF/Image)</label>
                            <input type="file" name="hod_signed_form" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload</button>
                        <a href="{% url 'my_applications' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
